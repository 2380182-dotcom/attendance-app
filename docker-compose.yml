version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: attendance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: ${DB_USERNAME:-springuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '${PORT:-8080}:8080'
    environment:
      DB_URL: jdbc:mysql://mysql:3306/attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-springuser}
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      DB_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      PORT: 8080
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8080/actuator/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
