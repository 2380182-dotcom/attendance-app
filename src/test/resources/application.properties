spring.datasource.url=jdbc:h2:mem:attendance_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.quartz.auto-startup=false
spring.flyway.enabled=false

jwt.secret=test-secret-key-for-jwt-signing-must-be-long-enough
jwt.expiration-ms=86400000

face.verification.confidence-threshold=0.85
face.verification.max-attempts=3

# Generous but still-active defaults for the shared test context — the whole
# suite's existing /auth/login + /auth/register calls total well under these
# (~10 combined at time of writing); AuthRateLimiterTest overrides these to
# much stricter per-class values to deterministically trigger 429s in a few
# requests, which spins up its own isolated Spring context and so can't
# affect any other test class's bucket state.
auth.rate-limit.ip.max-attempts=100
auth.rate-limit.ip.window-minutes=15
auth.rate-limit.account.max-attempts=50
auth.rate-limit.account.window-minutes=15

# Test-only key (not the real production key) — exercises the real encryption
# path across the whole shared-context suite as a broad regression check, not
# just the dedicated converter tests. Safe: confirmed no existing test asserts
# on the raw stored value of faceEmbedding/faceTemplate.
face.data.encryption.key=R2AzY/UTQZTd6LHdIgV2EcbYkwj9sXXnPon4FsKs/G4=
