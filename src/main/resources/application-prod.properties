# ===============================
# PRODUCTION PROFILE
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ===============================

# Database — credentials MUST come from environment variables (no defaults)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA — validate schema in production (never auto-modify)
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Logging — minimal in production
logging.level.com.dawnbread.attendance=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.springframework.jdbc=WARN

# DevTools — disabled in production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator — only health and info exposed
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.env.enabled=false

# JWT — MUST be set via JWT_SECRET environment variable
jwt.secret=${JWT_SECRET}

# CORS — restrict to your deployed frontend/mobile origins (comma-separated)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-app.onrender.com}

# Rate limiting
rate-limit.enabled=true
rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:120}
