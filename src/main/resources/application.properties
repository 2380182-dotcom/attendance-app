# ===============================
# DATABASE CONFIGURATION
# Set DB_PASSWORD via environment variable or .env file (see .env.example)
# ===============================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:springuser}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=AttendanceHikariPool

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================
# LOGGING CONFIGURATION
# ===============================

logging.level.com.dawnbread.attendance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.jdbc=DEBUG

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=${PORT:8080}
server.address=0.0.0.0

# ===============================
# SPRING BOOT DEVTOOLS
# ===============================

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===============================
# SPRING BOOT ACTUATOR (development)
# ===============================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# JWT CONFIGURATION
# ===============================

jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION}
jwt.expiration-ms=${JWT_EXPIRATION_MS:864000000}

# ===============================
# CORS CONFIGURATION
# Comma-separated origins; use * for local mobile development
# ===============================

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ===============================
# RATE LIMITING
# ===============================

rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:300}
