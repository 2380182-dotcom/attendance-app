# ===============================
# DATABASE CONFIGURATION
# ===============================

# Database Configuration - Parameterized with local MySQL defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:springuser}
spring.datasource.password=${DB_PASSWORD:Rafay9802}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=AttendanceHikariPool

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

# Show SQL in console
spring.jpa.show-sql=true

# DDL Auto (create, update, create-drop, validate, none)
spring.jpa.hibernate.ddl-auto=update

# Format SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# Enable logging of SQL parameters
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================
# LOGGING CONFIGURATION
# ===============================

# Logging levels
logging.level.com.dawnbread.attendance=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.jdbc=DEBUG

# ===============================
# SERVER CONFIGURATION
# ===============================

# Server port - Dynamically bound to PORT env var on Render, defaults to 8080 locally
server.port=${PORT:8080}
server.address=0.0.0.0
# ===============================
# JACKSON CONFIGURATION (COMMENTED OUT - FIXES THE ERROR)
# ===============================

# spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
# spring.jackson.time-zone=UTC
# spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ===============================
# SPRING BOOT DEVTOOLS
# ===============================

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===============================
# SPRING BOOT ACTUATOR
# ===============================

management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always